name: Update Gray Team Schedule

on:
  schedule:
    - cron: "0 10 * * *"   # 6 AM EDT
    - cron: "0 22 * * *"   # 6 PM EDT
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py
        working-directory: ${{ github.workspace }}

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Stage ALL updated files, including all_team_games.tsv
          git add *.ics teams.json all_team_games.tsv

          git commit -m "Auto-update all team schedules" || echo "No changes"
          git push
